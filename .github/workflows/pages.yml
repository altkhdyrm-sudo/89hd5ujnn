name: pages build and deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build with Vite
        run: npm run build

      - name: Verify dist exists
        run: |
          echo "===== DIST ROOT ====="
          ls -la dist
          echo "===== DIST ASSETS ====="
          ls -la dist/assets
          echo "===== DIST INDEX ====="
          cat dist/index.html
          echo "===== CHECK FOR RAW DEV ENTRY ====="
          if grep -R "/src/main.tsx" dist/index.html; then
            echo "ERROR: dist/index.html still contains /src/main.tsx"
            exit 1
          fi
          echo "===== CHECK FOR ASSETS ENTRY ====="
          if ! grep -R "assets/" dist/index.html; then
            echo "ERROR: dist/index.html does not contain built assets"
            exit 1
          fi
          echo "===== CHECK DEPLOY MARKER ====="
          cat dist/deploy-check.txt

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
